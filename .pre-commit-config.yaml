default_install_hook_types:
  - pre-commit  # Make sure hooks at the pre-commit stage are enabled
  - commit-msg  # Make sure hooks at the commit-msg stage are enabled

repos:
- repo: https://github.com/compilerla/conventional-pre-commit
  rev: v4.2.0
  hooks:
    - id: conventional-pre-commit
      stages: [commit-msg]
      args: ["--verbose"]
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.6.0
  hooks:
    - id: end-of-file-fixer
    - id: trailing-whitespace
    - id: check-yaml
- repo: local
  hooks:
    - id: cargo-fmt
      name: cargo fmt
      entry: cargo fmt -- --check
      language: system
      types: [rust]
      pass_filenames: false
    - id: cargo-clippy
      name: cargo clippy
      entry: cargo clippy --all-targets --all-features -- -D warnings
      language: system
      types: [rust]
      pass_filenames: false
    - id: cargo-deny
      name: cargo deny
      entry: cargo deny check
      language: system
      pass_filenames: false
    - id: cargo-fmt-codegen
      name: cargo fmt (rustc_codegen_tuffy)
      entry: cargo fmt --manifest-path rustc_codegen_tuffy/Cargo.toml -- --check
      language: system
      types: [rust]
      pass_filenames: false
    - id: cargo-clippy-codegen
      name: cargo clippy (rustc_codegen_tuffy)
      entry: cargo clippy --manifest-path rustc_codegen_tuffy/Cargo.toml --all-targets --all-features -- -D warnings
      language: system
      types: [rust]
      pass_filenames: false
    - id: cargo-deny-codegen
      name: cargo deny (rustc_codegen_tuffy)
      entry: cargo deny --manifest-path rustc_codegen_tuffy/Cargo.toml check
      language: system
      pass_filenames: false
