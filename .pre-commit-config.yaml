default_install_hook_types:
  - pre-commit  # Make sure hooks at the pre-commit stage are enabled
  - commit-msg  # Make sure hooks at the commit-msg stage are enabled

repos:
- repo: https://github.com/compilerla/conventional-pre-commit
  rev: v4.2.0
  hooks:
    - id: conventional-pre-commit
      stages: [commit-msg]
      args: ["--verbose"]
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.6.0
  hooks:
    - id: end-of-file-fixer
    - id: trailing-whitespace
    - id: check-yaml
- repo: local
  hooks:
    - id: cargo-check
      name: cargo check
      entry: cargo check --all-targets --all-features
      language: system
      types: [rust]
      pass_filenames: false
    - id: cargo-check-codegen
      name: cargo check (rustc_codegen_tuffy)
      entry: cargo check --manifest-path rustc_codegen_tuffy/Cargo.toml --all-targets --all-features
      language: system
      types: [rust]
      pass_filenames: false
    - id: cargo-fmt
      name: cargo fmt
      entry: "bash -c 'cargo fmt && git add -u && cargo fmt -- --check'"
      language: system
      types: [rust]
      pass_filenames: false
    - id: cargo-clippy
      name: cargo clippy
      entry: "bash -c 'cargo clippy --fix --allow-dirty --allow-staged --all-targets --all-features 2>&1 || true; git add -u; cargo clippy --all-targets --all-features -- -D warnings'"
      language: system
      types: [rust]
      pass_filenames: false
    - id: cargo-deny
      name: cargo deny
      entry: cargo deny check
      language: system
      pass_filenames: false
    - id: cargo-fmt-codegen
      name: cargo fmt (rustc_codegen_tuffy)
      entry: "bash -c 'cargo fmt --manifest-path rustc_codegen_tuffy/Cargo.toml && git add -u && cargo fmt --manifest-path rustc_codegen_tuffy/Cargo.toml -- --check'"
      language: system
      types: [rust]
      pass_filenames: false
    - id: cargo-clippy-codegen
      name: cargo clippy (rustc_codegen_tuffy)
      entry: "bash -c 'cargo clippy --fix --allow-dirty --allow-staged --manifest-path rustc_codegen_tuffy/Cargo.toml --all-targets --all-features 2>&1 || true; git add -u; cargo clippy --manifest-path rustc_codegen_tuffy/Cargo.toml --all-targets --all-features -- -D warnings'"
      language: system
      types: [rust]
      pass_filenames: false
    - id: cargo-deny-codegen
      name: cargo deny (rustc_codegen_tuffy)
      entry: cargo deny --manifest-path rustc_codegen_tuffy/Cargo.toml check
      language: system
      pass_filenames: false
    - id: rustc-codegen-tuffy-tests
      name: rustc_codegen_tuffy quick tests
      entry: bash rustc_codegen_tuffy/tests/run-quick-tests.sh
      language: system
      types: [rust]
      pass_filenames: false
