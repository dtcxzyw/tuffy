name: CI

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-28
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lean
        uses: actions/cache@v4
        with:
          path: lean/.lake
          key: ${{ runner.os }}-lean-${{ hashFiles('lean/lean-toolchain', 'lean/lakefile.toml') }}

      - name: Build Lean export modules
        run: cd lean && lake build TuffyLean.Export.Json

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: cargo deny
        run: cargo deny check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-targets --all-features

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-28
          components: rustc-dev, llvm-tools-preview, rust-src

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            rustc_codegen_tuffy/target
          key: ${{ runner.os }}-cargo-ui-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lean
        uses: actions/cache@v4
        with:
          path: lean/.lake
          key: ${{ runner.os }}-lean-${{ hashFiles('lean/lean-toolchain', 'lean/lakefile.toml') }}

      - name: Build Lean export modules
        run: cd lean && lake build TuffyLean.Export.Json

      - name: Build codegen backend (release)
        run: cd rustc_codegen_tuffy && cargo build --release

      - name: Run quick tests
        run: |
          chmod +x rustc_codegen_tuffy/tests/run-quick-tests.sh
          BACKEND=rustc_codegen_tuffy/target/release/librustc_codegen_tuffy.so \
            rustc_codegen_tuffy/tests/run-quick-tests.sh

      - name: Run crate tests (bitflags, syn)
        run: |
          chmod +x rustc_codegen_tuffy/tests/run-crate-tests.sh
          BACKEND=rustc_codegen_tuffy/target/release/librustc_codegen_tuffy.so \
            rustc_codegen_tuffy/tests/run-crate-tests.sh

      - name: Clone rustc UI tests (pinned to 1.93.1)
        run: |
          git clone --filter=blob:none --sparse -b 1.93.1 https://github.com/rust-lang/rust.git scratch/rust
          cd scratch/rust && git sparse-checkout set tests/ui library

      - name: Run UI tests
        run: |
          chmod +x rustc_codegen_tuffy/tests/run-ui-tests.sh
          rustc_codegen_tuffy/tests/run-ui-tests.sh

      - name: Run run-pass tests
        run: |
          chmod +x rustc_codegen_tuffy/tests/run-pass-tests.sh
          rustc_codegen_tuffy/tests/run-pass-tests.sh

      - name: Run doctests
        run: |
          chmod +x rustc_codegen_tuffy/tests/run-doctest.sh
          rustc_codegen_tuffy/tests/run-doctest.sh scratch/rust/library

      - name: Run build-std tests
        run: |
          chmod +x rustc_codegen_tuffy/tests/run-build-std-tests.sh
          BACKEND=rustc_codegen_tuffy/target/release/librustc_codegen_tuffy.so \
            rustc_codegen_tuffy/tests/run-build-std-tests.sh

      - name: Run stdlib tests (coretests + alloctests)
        run: |
          chmod +x rustc_codegen_tuffy/tests/run-stdlib-tests.sh
          BACKEND=rustc_codegen_tuffy/target/release/librustc_codegen_tuffy.so \
            rustc_codegen_tuffy/tests/run-stdlib-tests.sh

  lean:
    name: Lean 4 CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lean
        uses: actions/cache@v4
        with:
          path: lean/.lake
          key: ${{ runner.os }}-lean-${{ hashFiles('lean/lean-toolchain', 'lean/lakefile.toml') }}

      - name: Build Lean
        run: cd lean && lake build
